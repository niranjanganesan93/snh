<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubhada & Harshal — 3 September 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Marcellus&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; overflow:hidden; }
  .scene{ position:relative; width:100%; height:100vh; display:flex; align-items:flex-end; justify-content:center; }
  .bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center 60%;
    transform:scale(1.06);
    animation:slowZoom 18s ease-out forwards;
  }
  @keyframes slowZoom{ from{transform:scale(1.06);} to{transform:scale(1);} }
  .overlay{
    position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(20,8,4,0.08) 0%, rgba(20,8,4,0.05) 40%, rgba(20,8,4,0.55) 70%, rgba(20,8,4,0.82) 100%);
  }
  .content{
    position:relative; z-index:2; text-align:center; color:#f7f1e6;
    padding:0 24px 52px; width:100%; max-width:640px;
    opacity:0; transform:translateY(20px);
    animation:riseIn 1.4s cubic-bezier(.22,1,.36,1) 0.6s forwards;
  }
  @keyframes riseIn{ to{opacity:1;transform:translateY(0);} }
  .eyebrow{
    font-family:'Jost',sans-serif; font-weight:300; font-size:0.68rem;
    letter-spacing:0.35em; text-transform:uppercase; opacity:0.75; margin-bottom:14px;
  }
  .names{
    font-family:'Marcellus',serif; font-size:clamp(2.4rem,10vw,4rem);
    line-height:1.05; color:#fff; text-shadow:0 2px 24px rgba(0,0,0,0.4);
  }
  .amp{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    color:#d9b870; font-size:0.6em; display:block; margin:4px 0;
  }
  .divider{ width:0; height:1px; background:#d9b870; margin:20px auto; animation:growLine 1s ease 1.6s forwards; }
  @keyframes growLine{ to{width:60px;} }
  .date{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(1rem,3.5vw,1.35rem); opacity:0.9; letter-spacing:0.04em; margin-bottom:28px;
  }
  .countdown{ display:flex; justify-content:center; gap:clamp(14px,4vw,32px); }
  .count-box{ min-width:52px; }
  .count-num{ font-family:'Marcellus',serif; font-size:clamp(1.6rem,6vw,2.4rem); color:#d9b870; line-height:1; }
  .count-label{ font-family:'Jost',sans-serif; font-weight:300; font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; opacity:0.6; margin-top:5px; }
  .petal{ position:fixed; top:-5%; border-radius:60% 0 60% 0; opacity:0.6; pointer-events:none; z-index:3; animation:fall linear infinite; }
  @keyframes fall{
    0%{transform:translateY(-10vh) translateX(0) rotate(0deg);}
    100%{transform:translateY(110vh) translateX(var(--drift)) rotate(360deg);}
  }
  @media(prefers-reduced-motion:reduce){
    .bg{animation:none;transform:scale(1);}
    .content{animation:none;opacity:1;transform:none;}
    .divider{animation:none;width:60px;}
    .petal{display:none;}
  }
</style>
</head>
<body>
<div class="scene">
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="names">Shubhada<span class="amp">&amp;</span>Harshal</div>
    <div class="divider"></div>
    <div class="date">Thursday, 3rd September 2026 &middot; Bangor, Maine</div>
    <div class="countdown">
      <div class="count-box"><div class="count-num" id="cd-d">00</div><div class="count-label">Days</div></div>
      <div class="count-box"><div class="count-num" id="cd-h">00</div><div class="count-label">Hours</div></div>
      <div class="count-box"><div class="count-num" id="cd-m">00</div><div class="count-label">Mins</div></div>
      <div class="count-box"><div class="count-num" id="cd-s">00</div><div class="count-label">Secs</div></div>
    </div>
    <div style="margin-top:24px; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(0.95rem,3vw,1.2rem); opacity:0.65; letter-spacing:0.08em;">Save the date</div>
  </div>
</div>
